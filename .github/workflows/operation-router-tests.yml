name: operation-router verification

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Pester 3.4
        shell: powershell
        run: |
          $available = Get-Module -ListAvailable Pester |
            Where-Object { $_.Version -eq [version]'3.4.0' } |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if ($null -eq $available) {
            Install-Module Pester -RequiredVersion 3.4.0 -Scope CurrentUser -Force -AllowClobber
          }
          Import-Module Pester -RequiredVersion 3.4.0 -Force

      - name: Parse PowerShell source
        shell: powershell
        run: |
          $errors = @()
          foreach ($file in Get-ChildItem -LiteralPath . -Recurse -File -Filter *.ps1) {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$tokens,
              [ref]$parseErrors
            ) | Out-Null
            $errors += @($parseErrors)
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Parse config JSON
        shell: powershell
        run: |
          Get-Content -LiteralPath .\config\config.json -Raw -Encoding UTF8 |
            ConvertFrom-Json |
            Out-Null

      - name: Run source-tree tests
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\run-tests.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run isolated installed fixture
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\run-installed-fixture.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify manifest SHA-256
        shell: powershell
        run: |
          $failures = @()
          foreach ($line in Get-Content -LiteralPath .\manifest-sha256.txt -Encoding UTF8) {
            if ([string]::IsNullOrWhiteSpace($line)) { continue }
            if ($line -notmatch '^([0-9a-fA-F]{64})  (.+)$') {
              $failures += "invalid manifest line: $line"
              continue
            }
            $expected = $Matches[1].ToLowerInvariant()
            $path = Join-Path (Get-Location).Path $Matches[2]
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              $failures += "missing: $($Matches[2])"
              continue
            }
            $actual = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -cne $expected) { $failures += "hash mismatch: $($Matches[2])" }
          }
          if ($failures.Count -gt 0) {
            $failures | ForEach-Object { Write-Error $_ }
            exit 1
          }
